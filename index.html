<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AHMP Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Nunito:wght@800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue:          #155A9E;
    --blue-dark:     #0e4278;
    --blue-light:    #e8f0f9;
    --blue-border:   #7aadd4;
    --purple:        #F067AF;
    --purple-dark:   #d44d96;
    --purple-light:  #fef0f7;
    --purple-border: #f7aed8;
    --purple-soft:   #fde3f1;
    --green:         #22c55e;
    --orange:        #f97316;
    --red:           #ef4444;
    --gray-50:       #f9fafb;
    --gray-100:      #f3f4f6;
    --gray-200:      #e5e7eb;
    --gray-300:      #d1d5db;
    --gray-400:      #9ca3af;
    --gray-500:      #6b7280;
    --gray-600:      #4b5563;
    --gray-800:      #1f2937;
    --gray-900:      #111827;
    --font-display:  "Nunito", sans-serif;
    --font-body:     "DM Sans", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: #ffffff;
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }

  .column {
    width: 100%;
    max-width: 960px;
  }

  /* ---- Masthead ---- */
  .masthead {
    margin-bottom: 28px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray-400);
    margin-bottom: 6px;
  }
  h1.site-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    color: var(--gray-900);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    color: var(--gray-500);
  }

  /* ---- Controls ---- */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .search {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    stroke: var(--gray-400);
    pointer-events: none;
  }
  .search input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--gray-900);
    background: #fff;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 9px 14px 9px 38px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search input::placeholder { color: var(--gray-400); }
  .search input:focus { border-color: var(--blue); }

  select {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-600);
    background: #fff;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 9px 34px 9px 14px;
    outline: none;
    cursor: pointer;
    appearance: none;
    transition: border-color 0.15s ease;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  select:hover { border-color: var(--gray-300); }
  select:focus { border-color: var(--blue); }

  /* ---- Tag filters ---- */
  .tag-section { margin-bottom: 28px; }
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .chip {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
    background: #fff;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .chip:hover { border-color: var(--blue-border); }
  .chip.active {
    background: var(--blue-light);
    border-color: var(--blue-border);
    color: var(--blue-dark);
  }

  /* ---- Section headings ---- */
  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray-400);
    white-space: nowrap;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--gray-100);
  }

  /* ---- Grids ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  @media (max-width: 680px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 440px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ---- Cards ---- */
  .card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    background: var(--gray-50);
    border: 2px solid var(--gray-200);
    border-radius: 14px;
    padding: 16px 18px;
    transition: background 0.25s ease, border-color 0.25s ease;
    min-height: 120px;
  }

  /* Blue cards (regular) */
  .card.blue:hover {
    background: var(--blue-light);
    border-color: var(--blue-border);
  }

  /* Purple cards (top picks) */
  .card.purple {
    background: var(--purple-light);
    border-color: var(--purple-border);
  }
  .card.purple:hover {
    background: var(--purple-soft);
    border-color: var(--purple-dark);
  }

  .card h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-900);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px;
    font-weight: 400;
    color: var(--gray-500);
    line-height: 1.5;
    flex: 1;
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .pill {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-radius: 99px;
    padding: 3px 9px;
  }
  .pill.blue {
    color: var(--blue-dark);
    background: var(--blue-light);
  }
  .pill.purple {
    color: var(--purple-dark);
    background: var(--purple-soft);
  }
  .card-arrow {
    width: 16px; height: 16px;
    stroke: var(--gray-300);
    fill: none;
    transition: stroke 0.2s ease, transform 0.2s ease;
    flex-shrink: 0;
  }
  .card.blue:hover .card-arrow  { stroke: var(--blue);   transform: translate(2px,-2px); }
  .card.purple:hover .card-arrow { stroke: var(--purple); transform: translate(2px,-2px); }

  /* ---- Empty state ---- */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
    font-size: 15px;
  }

  /* ---- Top picks hidden when filtering ---- */
  .top-section { transition: opacity 0.2s ease; }
  .top-section.hidden { display: none; }
</style>
</head>
<body>
<div class="column">

  <div class="masthead">
    <div class="eyebrow">Collection</div>
    <h1 class="site-title">AHMP Apps</h1>
    <p class="subtitle">A collection of handy tools, always available.</p>
  </div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" id="search" placeholder="Search apps…" aria-label="Search apps" />
    </div>
    <select id="sort" aria-label="Sort order">
      <option value="title">Sort: A–Z</option>
      <option value="date">Sort: Newest first</option>
    </select>
  </div>

  <div class="tag-section">
    <div class="eyebrow">Filter by category</div>
    <div class="tags" id="tags"></div>
  </div>

  <!-- Top picks -->
  <div class="top-section" id="topSection">
    <div class="section-head">
      <h2>Top picks</h2>
      <div class="section-line"></div>
    </div>
    <div class="grid" id="topGrid"></div>
  </div>

  <!-- All apps -->
  <div class="section-head">
    <h2>All apps</h2>
    <div class="section-line"></div>
  </div>
  <div class="grid" id="grid">
    <div class="empty">Loading…</div>
  </div>

</div>

<script>
(function () {
  "use strict";

  var TOP_PICKS = ["Countdown Timer", "QR Code Generator", "Case Converter"];

  var grid      = document.getElementById("grid");
  var topGrid   = document.getElementById("topGrid");
  var topSection= document.getElementById("topSection");
  var tagBox    = document.getElementById("tags");
  var searchEl  = document.getElementById("search");
  var sortEl    = document.getElementById("sort");

  var DOCS = [];
  var activeTag = null;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function formatDate(iso) {
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, {year:"numeric", month:"short", day:"numeric"});
  }

  function isTopPick(doc) {
    return TOP_PICKS.indexOf(doc.title) >= 0;
  }

  function makeCard(d, isPurple) {
    var a = document.createElement("a");
    a.className = "card " + (isPurple ? "purple" : "blue");
    a.href = d.file;
    a.target = "_blank";
    a.rel = "noopener";
    var pillClass = isPurple ? "pill purple" : "pill blue";
    var tags = (d.tags || []).map(function (t) {
      return '<span class="' + pillClass + '">' + escapeHtml(t) + "</span>";
    }).join(" ");
    a.innerHTML =
      "<h2>" + escapeHtml(d.title) + "</h2>" +
      '<p class="card-desc">' + escapeHtml(d.desc || "") + "</p>" +
      '<div class="card-foot">' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;">' + tags + "</div>" +
        '<svg class="card-arrow" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>' +
      "</div>";
    return a;
  }

  function collectTags() {
    var set = {};
    DOCS.forEach(function (d) {
      (d.tags || []).forEach(function (t) { set[t] = true; });
    });
    return Object.keys(set).sort();
  }

  function renderTags() {
    tagBox.innerHTML = "";
    var all = document.createElement("button");
    all.className = "chip" + (activeTag === null ? " active" : "");
    all.textContent = "All";
    all.onclick = function () { activeTag = null; render(); };
    tagBox.appendChild(all);
    collectTags().forEach(function (t) {
      var b = document.createElement("button");
      b.className = "chip" + (activeTag === t ? " active" : "");
      b.textContent = t;
      b.onclick = function () { activeTag = (activeTag === t ? null : t); render(); };
      tagBox.appendChild(b);
    });
  }

  function render() {
    renderTags();
    var term = searchEl.value.trim().toLowerCase();
    var isFiltering = term || activeTag;

    // Filter
    var rows = DOCS.filter(function (d) {
      var hay = (d.title + " " + (d.desc || "")).toLowerCase();
      var matchTerm = !term || hay.indexOf(term) >= 0;
      var matchTag  = !activeTag || (d.tags || []).indexOf(activeTag) >= 0;
      return matchTerm && matchTag;
    });

    // Sort
    rows.sort(function (a, b) {
      if (sortEl.value === "date") return (b.date || "").localeCompare(a.date || "");
      return a.title.localeCompare(b.title);
    });

    // Top picks — hide when user is actively searching/filtering
    if (isFiltering) {
      topSection.classList.add("hidden");
    } else {
      topSection.classList.remove("hidden");
      topGrid.innerHTML = "";
      TOP_PICKS.forEach(function (title) {
        var doc = DOCS.find(function (d) { return d.title === title; });
        if (doc) topGrid.appendChild(makeCard(doc, true));
      });
    }

    // Main grid — exclude top picks when not filtering so they don't repeat
    var mainRows = isFiltering ? rows : rows.filter(function (d) { return !isTopPick(d); });

    grid.innerHTML = "";
    if (mainRows.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No apps match that search.";
      grid.appendChild(empty);
    } else {
      mainRows.forEach(function (d) {
        grid.appendChild(makeCard(d, false));
      });
    }
  }

  searchEl.addEventListener("input", render);
  sortEl.addEventListener("change", render);

  fetch("library.json", { cache: "no-cache" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (data) {
      DOCS = Array.isArray(data) ? data : [];
      render();
    })
    .catch(function (err) {
      grid.innerHTML = '<div class="empty">Could not load library.json (' + err.message + '). Run via a local server, not file://.</div>';
    });
})();
</script>
</body>
</html>
