<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Case Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #155A9E;
  --blue-dark: #0e4278;
  --blue-light: #e8f0f9;
  --blue-border: #7aadd4;

  --purple: #F067AF;
  --purple-dark: #d44d96;
  --purple-light: #fef0f7;
  --purple-border: #f7aed8;
  --purple-soft: #fde3f1;
  --purple-btn: #f49ccc;

  --green: #22c55e;
  --orange: #f97316;
  --red: #ef4444;

  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-800: #1f2937;
  --gray-900: #111827;

  --font-display: 'Nunito', system-ui, sans-serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: #fff; }
body {
  font-family: var(--font-body);
  color: var(--gray-900);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 48px;
  -webkit-font-smoothing: antialiased;
}

.col {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gray-400);
}

.title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}

.title {
  font-size: clamp(18px, 3.5vw, 26px);
  font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.5px;
}

.meta {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}

.input-area {
  width: 100%;
  min-height: 200px;
  padding: 12px 14px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  color: var(--gray-900);
  background: #fff;
  resize: vertical;
  transition: border-color 0.2s ease;
  line-height: 1.5;
}

.input-area:focus {
  outline: none;
  border-color: var(--blue);
}

.input-area::placeholder {
  color: var(--gray-400);
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--gray-400);
  margin-bottom: -10px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: #fff;
  border: 2px solid var(--gray-200);
  color: var(--gray-600);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  padding: 9px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}

.chip:hover {
  border-color: var(--blue-border);
}

.chip.active {
  background: var(--blue-light);
  color: var(--blue-dark);
  border-color: var(--blue-border);
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.btn-primary {
  background: var(--green);
  color: #fff;
  border: none;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 16px;
  padding: 12px 32px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s ease, opacity 0.2s ease;
}

.btn-primary:hover:not(:disabled) {
  filter: brightness(0.95);
}

.btn-primary.copied {
  background: var(--blue);
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-neutral {
  background: #fff;
  color: var(--gray-600);
  border: 2px solid var(--gray-200);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s ease, color 0.15s ease;
}

.btn-neutral:hover {
  border-color: var(--gray-400);
  color: var(--gray-900);
}

.btn-neutral:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
</head>
<body>
  <main class="col">
    <div class="title-row">
      <div>
        <div class="eyebrow">Text Tool</div>
        <h1 class="title" style="margin-top:6px;">Case Converter</h1>
      </div>
      <div class="meta" id="metaCount">0 chars · 0 words</div>
    </div>

    <textarea
      class="input-area"
      id="input"
      placeholder="Paste or type your text here…"
      autofocus
      spellcheck="false"
    ></textarea>

    <div class="section-label">Choose a case</div>
    <div class="chips" id="chips">
      <button class="chip" data-mode="upper">UPPER</button>
      <button class="chip" data-mode="lower">lower</button>
      <button class="chip" data-mode="title">Title Case</button>
      <button class="chip" data-mode="sentence">Sentence case</button>
      <button class="chip" data-mode="alternating">aLtErNaTiNg</button>
      <button class="chip" data-mode="inverse">iNVERSE</button>
    </div>

    <div class="actions">
      <button class="btn-primary" id="copyBtn" disabled>Copy</button>
      <button class="btn-neutral" id="clearBtn" disabled>Clear</button>
    </div>
  </main>

<script>
(() => {
  const input   = document.getElementById('input');
  const chipsEl = document.getElementById('chips');
  const chips   = chipsEl.querySelectorAll('.chip');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const metaEl  = document.getElementById('metaCount');

  let mode = 'upper';

  const converters = {
    upper:   (s) => s.toUpperCase(),
    lower:   (s) => s.toLowerCase(),
    title:   (s) => s.toLowerCase().replace(/\b([a-zÀ-ſ])/g, (c) => c.toUpperCase()),
    sentence: (s) => {
      const lower = s.toLowerCase();
      return lower.replace(/(^\s*[a-zÀ-ſ])|([.!?]\s+[a-zÀ-ſ])/g, (m) => m.toUpperCase());
    },
    alternating: (s) => {
      let i = 0;
      return s.split('').map((c) => {
        if (!/[a-zA-Z]/.test(c)) return c;
        const out = i % 2 === 0 ? c.toLowerCase() : c.toUpperCase();
        i++;
        return out;
      }).join('');
    },
    inverse: (s) => s.split('').map((c) => {
      if (c === c.toUpperCase() && c !== c.toLowerCase()) return c.toLowerCase();
      if (c === c.toLowerCase() && c !== c.toUpperCase()) return c.toUpperCase();
      return c;
    }).join('')
  };

  function convertInPlace() {
    const text = input.value;
    if (!text) return;
    const converted = converters[mode](text);
    if (converted === text) return;
    const start = input.selectionStart;
    const end   = input.selectionEnd;
    input.value = converted;
    input.setSelectionRange(start, end);
  }

  function updateMeta() {
    const text = input.value;
    const hasText = text.length > 0;
    copyBtn.disabled  = !hasText;
    clearBtn.disabled = !hasText;
    const chars = text.length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    metaEl.textContent = `${chars} char${chars === 1 ? '' : 's'} · ${words} word${words === 1 ? '' : 's'}`;
  }

  input.addEventListener('input', () => {
    updateMeta();
  });

  chips.forEach((chip) => {
    chip.addEventListener('click', () => {
      chips.forEach((c) => c.classList.remove('active'));
      chip.classList.add('active');
      mode = chip.dataset.mode;
      convertInPlace();
      updateMeta();
      input.focus();
    });
  });

  copyBtn.addEventListener('click', async () => {
    if (copyBtn.disabled) return;
    try {
      await navigator.clipboard.writeText(input.value);
      const original = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = original;
        copyBtn.classList.remove('copied');
      }, 1400);
    } catch (e) {
      copyBtn.textContent = 'Press Ctrl+C';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1600);
    }
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    updateMeta();
    input.focus();
  });

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      if (!copyBtn.disabled) copyBtn.click();
    }
  });

  updateMeta();
})();
</script>
</body>
</html>
