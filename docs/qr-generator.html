  <style>
    :root {
      /* brand */
      --blue: #155A9E;
      --blue-dark: #0e4278;
      --blue-light: #e8f0f9;
      --blue-border: #7aadd4;
      --purple: #F067AF;
      --purple-dark: #d44d96;
      --purple-light: #fef0f7;
      --purple-border: #f7aed8;
      --purple-soft: #fde3f1;
      --purple-btn: #f49ccc;

      /* status */
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;

      /* neutrals */
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --gray-900: #111827;

      /* fonts */
      --font-display: 'Nunito', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: white; }

    body {
      font-family: var(--font-body);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .title {
      font-size: clamp(13px, 2.5vw, 18px);
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      align-self: flex-start;
    }

    /* Hero — the QR preview */
    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 6px 0 4px;
    }

    .qr-stage {
      width: 100%;
      max-width: 260px;
      aspect-ratio: 1 / 1;
      background: var(--purple-light);
      border: 3px solid var(--purple-border);
      border-radius: 22px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s ease, background 0.25s ease;
      box-shadow: 0 4px 24px rgba(240, 103, 175, 0.12);
    }
    .qr-stage.is-empty { background: var(--purple-soft); border-color: var(--purple-btn); }
    .qr-stage.is-error { border-color: var(--red); background: #fff5f5; }

    .qr-stage canvas {
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
    }

    .qr-placeholder {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-400);
      text-align: center;
      padding: 0 18px;
      line-height: 1.5;
    }
    .qr-placeholder.is-error { color: var(--red); }

    .hero-meta {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--gray-500);
      font-weight: 600;
      min-height: 1.2em;
      text-align: center;
      padding: 0 12px;
      word-break: break-word;
    }

    /* Section blocks */
    .section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    /* Content row — tabs beside the input */
    .content-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .content-row .tabs {
      flex-direction: column;
      flex-shrink: 0;
    }
    .form-panels {
      flex: 1;
      min-width: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-btn {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-600);
      background: white;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      padding: 9px 18px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.2s ease, color 0.2s ease;
    }
    .tab-btn:hover { border-color: var(--blue-border); color: var(--gray-800); }
    .tab-btn.active {
      background: var(--blue-light);
      border-color: var(--blue-border);
      color: var(--blue-dark);
    }

    /* Form fields */
    .form-panel { display: flex; flex-direction: column; gap: 10px; }
    .form-panel.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray-500);
    }

    input[type="text"],
    input[type="url"],
    input[type="email"],
    textarea {
      font-family: var(--font-body);
      font-size: 14px;
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      color: var(--gray-900);
      background: white;
      transition: border-color 0.2s ease;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--blue);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: var(--font-body);
    }

    /* Customization panel */
    .panel {
      width: 100%;
      background: var(--gray-50);
      border: 2px solid var(--gray-200);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .color-control { flex: 1 1 220px; display: flex; flex-direction: column; gap: 6px; }

    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      background: white;
      padding: 4px 10px 4px 4px;
      transition: border-color 0.2s ease;
    }
    .color-input-wrap:focus-within { border-color: var(--blue); }
    .color-input-wrap input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      border: none;
      background: transparent;
      width: 34px;
      height: 32px;
      cursor: pointer;
      border-radius: 6px;
      padding: 0;
    }
    .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-input-wrap input[type="color"]::-webkit-color-swatch {
      border: 2px solid var(--gray-200);
      border-radius: 6px;
    }
    .color-input-wrap input[type="color"]::-moz-color-swatch {
      border: 2px solid var(--gray-200);
      border-radius: 6px;
    }
    .color-input-wrap input[type="text"] {
      border: none;
      padding: 4px 0;
      font-size: 13px;
      background: transparent;
      flex: 1;
      min-width: 0;
      font-variant-numeric: tabular-nums;
    }
    .color-input-wrap input[type="text"]:focus { outline: none; border: none; }

    .size-control { flex: 1 1 100%; display: flex; flex-direction: column; gap: 6px; }

    .preset-control { flex: 1 1 100%; display: flex; flex-direction: column; gap: 8px; }
    .preset-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .preset-btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      background: white;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--gray-600);
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.2s ease, color 0.2s ease;
    }
    .preset-btn:hover { border-color: var(--blue-border); color: var(--gray-800); }
    .preset-btn.active {
      background: var(--blue-light);
      border-color: var(--blue-border);
      color: var(--blue-dark);
    }

    .hint {
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
    }

    /* Download row */
    .download-row {
      width: 100%;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .download-btn {
      flex: 1 1 0;
      min-width: 110px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: var(--blue);
      border: 2px solid var(--blue);
      border-radius: 8px;
      padding: 11px 18px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .download-btn:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .download-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .download-btn:disabled:hover { background: var(--blue); border-color: var(--blue); }

    .download-btn.primary {
      flex: 2 1 0;
      background: var(--purple);
      border-color: var(--purple);
      font-size: 17px;
      padding: 14px 22px;
      box-shadow: 0 4px 20px rgba(240, 103, 175, 0.35);
    }
    .download-btn.primary:hover {
      background: var(--purple-dark);
      border-color: var(--purple-dark);
    }
    .download-btn.primary:disabled:hover {
      background: var(--purple);
      border-color: var(--purple);
    }

    /* Visually-hidden helpers */
    .vh {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="title">QR Generator</div>

    <div class="hero">
      <div class="qr-stage is-empty" id="qrStage">
        <canvas id="qrCanvas" style="display:none;"></canvas>
        <div class="qr-placeholder" id="qrPlaceholder">Type a link or email to generate a QR code</div>
      </div>
    </div>

    <div class="section">
      <div class="eyebrow">Content</div>
      <div class="content-row">
        <div class="tabs" role="tablist" id="tabs">
          <button class="tab-btn active" data-tab="url" role="tab" aria-selected="true">URL</button>
          <button class="tab-btn" data-tab="email" role="tab" aria-selected="false">Email</button>
        </div>
        <div class="form-panels">
          <div class="form-panel" data-panel="url">
            <div class="field">
              <input type="url" id="urlInput" placeholder="https://example.com" value="https://example.com" autocomplete="off">
            </div>
          </div>
          <div class="form-panel hidden" data-panel="email">
            <div class="field">
              <input type="email" id="emailTo" placeholder="name@example.com" autocomplete="off">
            </div>
            <div class="field">
              <input type="text" id="emailSubject" placeholder="Subject (optional)" autocomplete="off">
            </div>
            <div class="field">
              <textarea id="emailBody" placeholder="Message (optional)"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="eyebrow">Download</div>
      <div class="download-row">
        <button class="download-btn" id="downloadPng" type="button">PNG</button>
        <button class="download-btn" id="downloadSvg" type="button">SVG</button>
        <button class="download-btn primary" id="downloadJpg" type="button">JPG</button>
      </div>
    </div>

    <div class="section">
      <div class="eyebrow">Customize</div>
      <div class="panel">
        <div class="panel-row">
          <div class="color-control">
            <label class="field-label" for="fgColor">Foreground</label>
            <div class="color-input-wrap">
              <input type="color" id="fgColor" value="#212f53" aria-label="Foreground colour swatch">
              <input type="text" id="fgHex" value="#212f53" maxlength="7" aria-label="Foreground hex value" spellcheck="false">
            </div>
          </div>
          <div class="color-control">
            <label class="field-label" for="bgColor">Background</label>
            <div class="color-input-wrap">
              <input type="color" id="bgColor" value="#ffffff" aria-label="Background colour swatch">
              <input type="text" id="bgHex" value="#ffffff" maxlength="7" aria-label="Background hex value" spellcheck="false">
            </div>
          </div>
        </div>

        <div class="panel-row">
          <div class="size-control">
            <span class="field-label">Size</span>
            <div class="preset-row" id="sizeRow">
              <button class="preset-btn active" data-size="512">512 px</button>
              <button class="preset-btn" data-size="1024">1024 px</button>
              <button class="preset-btn" data-size="2048">2048 px</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script>
    /* roundRect polyfill for Safari < 15.4 */
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.arcTo(x + w, y,     x + w, y + h, r);
        this.arcTo(x + w, y + h, x,     y + h, r);
        this.arcTo(x,     y + h, x,     y,     r);
        this.arcTo(x,     y,     x + w, y,     r);
        this.closePath();
        return this;
      };
    }

    const state = {
      tab: 'url',
      fg: '#212f53',
      bg: '#ffffff',
      size: 512
    };

    const EC_FALLBACK = ['H', 'Q', 'M', 'L'];

    const els = {
      tabs: document.querySelectorAll('.tab-btn'),
      panels: document.querySelectorAll('.form-panel'),
      urlInput: document.getElementById('urlInput'),
      emailTo: document.getElementById('emailTo'),
      emailSubject: document.getElementById('emailSubject'),
      emailBody: document.getElementById('emailBody'),
      fgColor: document.getElementById('fgColor'),
      fgHex: document.getElementById('fgHex'),
      bgColor: document.getElementById('bgColor'),
      bgHex: document.getElementById('bgHex'),
      sizeRow: document.getElementById('sizeRow'),
      qrStage: document.getElementById('qrStage'),
      qrCanvas: document.getElementById('qrCanvas'),
      qrPlaceholder: document.getElementById('qrPlaceholder'),
      downloadPng: document.getElementById('downloadPng'),
      downloadJpg: document.getElementById('downloadJpg'),
      downloadSvg: document.getElementById('downloadSvg')
    };

    let currentSvg = '';
    let currentQr = null;
    let renderToken = 0;

    const FRAME_BG     = '#fef0f7';
    const FRAME_BORDER = '#f7aed8';

    function buildPayload() {
      if (state.tab === 'url') {
        return els.urlInput.value.trim();
      }
      if (state.tab === 'email') {
        const to = els.emailTo.value.trim();
        if (!to) return '';
        const params = [];
        const subj = els.emailSubject.value.trim();
        const body = els.emailBody.value.trim();
        if (subj) params.push('subject=' + encodeURIComponent(subj));
        if (body) params.push('body=' + encodeURIComponent(body));
        return 'mailto:' + to + (params.length ? '?' + params.join('&') : '');
      }
      return '';
    }

    function setDownloadsEnabled(enabled) {
      els.downloadPng.disabled = !enabled;
      els.downloadJpg.disabled = !enabled;
      els.downloadSvg.disabled = !enabled;
    }

    function setStageState(mode) {
      els.qrStage.classList.toggle('is-empty', mode === 'empty');
      els.qrStage.classList.toggle('is-error', mode === 'error');
    }

    function showPlaceholder(text, isError) {
      els.qrPlaceholder.textContent = text;
      els.qrPlaceholder.classList.toggle('is-error', !!isError);
      els.qrPlaceholder.style.display = '';
      els.qrCanvas.style.display = 'none';
    }

    function showCanvas() {
      els.qrPlaceholder.style.display = 'none';
      els.qrCanvas.style.display = '';
    }

    const MARGIN_CELLS = 2;

    function drawCanvas(qr, size, fg, bg) {
      const count = qr.getModuleCount();
      const totalCells = count + MARGIN_CELLS * 2;
      const cellSize = Math.max(1, Math.floor(size / totalCells));
      const actualSize = cellSize * totalCells;
      const canvas = els.qrCanvas;
      canvas.width = actualSize;
      canvas.height = actualSize;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, actualSize, actualSize);
      ctx.fillStyle = fg;
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.isDark(r, c)) {
            ctx.fillRect(
              (c + MARGIN_CELLS) * cellSize,
              (r + MARGIN_CELLS) * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }
    }

    function frameMetrics(size) {
      const padding     = Math.round(size * 0.07);
      const radius      = Math.round(size * 0.05);
      const borderWidth = Math.max(3, Math.round(size * 0.004));
      return { padding, radius, borderWidth, total: size + padding * 2 };
    }

    function buildFramedSvg(qr, size, fg, bg) {
      const { padding, radius, borderWidth, total } = frameMetrics(size);
      const count      = qr.getModuleCount();
      const totalCells = count + MARGIN_CELLS * 2;
      const cellSize   = size / totalCells;
      let path = '';
      for (let r = 0; r < count; r++) {
        let runStart = -1;
        for (let c = 0; c <= count; c++) {
          const dark = c < count && qr.isDark(r, c);
          if (dark && runStart === -1) {
            runStart = c;
          } else if (!dark && runStart !== -1) {
            const x = (runStart + MARGIN_CELLS) * cellSize + padding;
            const y = (r + MARGIN_CELLS) * cellSize + padding;
            const w = (c - runStart) * cellSize;
            path += 'M' + x + ' ' + y + 'h' + w + 'v' + cellSize + 'h-' + w + 'z';
            runStart = -1;
          }
        }
      }
      const half = borderWidth / 2;
      return '<?xml version="1.0" encoding="UTF-8"?>\n'
        + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + total + ' ' + total + '" width="' + total + '" height="' + total + '" shape-rendering="crispEdges">'
        + '<rect width="' + total + '" height="' + total + '" fill="' + FRAME_BG + '" rx="' + radius + '" ry="' + radius + '"/>'
        + '<rect x="' + half + '" y="' + half + '" width="' + (total - borderWidth) + '" height="' + (total - borderWidth) + '" fill="none" stroke="' + FRAME_BORDER + '" stroke-width="' + borderWidth + '" rx="' + radius + '" ry="' + radius + '"/>'
        + '<rect x="' + padding + '" y="' + padding + '" width="' + size + '" height="' + size + '" fill="' + bg + '"/>'
        + '<path d="' + path + '" fill="' + fg + '"/>'
        + '</svg>';
    }

    function createFramedCanvas(forJpg) {
      const qrSize = els.qrCanvas.width;
      const { padding, radius, borderWidth, total } = frameMetrics(qrSize);
      const c   = document.createElement('canvas');
      c.width   = total;
      c.height  = total;
      const ctx = c.getContext('2d');
      if (forJpg) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, total, total);
      }
      ctx.fillStyle = FRAME_BG;
      ctx.beginPath();
      ctx.roundRect(0, 0, total, total, radius);
      ctx.fill();
      ctx.strokeStyle = FRAME_BORDER;
      ctx.lineWidth   = borderWidth;
      ctx.beginPath();
      ctx.roundRect(borderWidth / 2, borderWidth / 2, total - borderWidth, total - borderWidth, radius);
      ctx.stroke();
      ctx.drawImage(els.qrCanvas, padding, padding);
      return c;
    }

    async function render() {
      const token = ++renderToken;
      const payload = buildPayload();

      if (!payload) {
        currentSvg = '';
        currentQr = null;
        setDownloadsEnabled(false);
        setStageState('empty');
        showPlaceholder('Type a link or email to generate a QR code', false);

        return;
      }

      if (typeof qrcode !== 'function') {
        setStageState('error');
        showPlaceholder('QR library failed to load. Check your internet connection and refresh.', true);
        setDownloadsEnabled(false);

        return;
      }

      let qr = null;
      for (const level of EC_FALLBACK) {
        try {
          const candidate = qrcode(0, level);
          candidate.addData(payload);
          candidate.make();
          qr = candidate;
          break;
        } catch (e) {
          // try the next-lower level
        }
      }

      if (token !== renderToken) return;

      if (!qr) {
        currentSvg = '';
        currentQr = null;
        setStageState('error');
        showPlaceholder('Content is too long to encode in a QR code. Try shortening it.', true);

        setDownloadsEnabled(false);
        return;
      }

      currentQr = qr;
      drawCanvas(qr, state.size, state.fg, state.bg);
      currentSvg = buildFramedSvg(qr, state.size, state.fg, state.bg);

      setStageState('ok');
      showCanvas();
      setDownloadsEnabled(true);

    }

    /* Tabs */
    function setTab(tab) {
      state.tab = tab;
      els.tabs.forEach(t => {
        const active = t.dataset.tab === tab;
        t.classList.toggle('active', active);
        t.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      els.panels.forEach(p => p.classList.toggle('hidden', p.dataset.panel !== tab));
      render();
    }
    els.tabs.forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));

    /* Content inputs */
    [els.urlInput, els.emailTo, els.emailSubject, els.emailBody].forEach(input => {
      input.addEventListener('input', render);
    });

    /* Auto-select the default URL on focus / click so it's easy to replace */
    let urlTouched = false;
    function selectUrlIfPristine() {
      if (!urlTouched) {
        requestAnimationFrame(() => els.urlInput.select());
      }
    }
    els.urlInput.addEventListener('focus', selectUrlIfPristine);
    els.urlInput.addEventListener('mouseup', e => {
      if (!urlTouched) { e.preventDefault(); selectUrlIfPristine(); }
    });
    els.urlInput.addEventListener('input', () => { urlTouched = true; });

    /* Colour sync */
    const HEX_RE = /^#([0-9a-fA-F]{6})$/;
    function syncColor(kind, value) {
      const v = value.toLowerCase();
      if (!HEX_RE.test(v)) return;
      state[kind] = v;
      if (kind === 'fg') {
        els.fgColor.value = v;
        els.fgHex.value = v;
      } else {
        els.bgColor.value = v;
        els.bgHex.value = v;
      }
      render();
    }
    els.fgColor.addEventListener('input', () => syncColor('fg', els.fgColor.value));
    els.bgColor.addEventListener('input', () => syncColor('bg', els.bgColor.value));
    els.fgHex.addEventListener('input', () => {
      let v = els.fgHex.value.trim();
      if (v && !v.startsWith('#')) { v = '#' + v; els.fgHex.value = v; }
      if (HEX_RE.test(v)) syncColor('fg', v);
    });
    els.bgHex.addEventListener('input', () => {
      let v = els.bgHex.value.trim();
      if (v && !v.startsWith('#')) { v = '#' + v; els.bgHex.value = v; }
      if (HEX_RE.test(v)) syncColor('bg', v);
    });
    els.fgHex.addEventListener('blur', () => { els.fgHex.value = state.fg; });
    els.bgHex.addEventListener('blur', () => { els.bgHex.value = state.bg; });

    /* Size presets */
    els.sizeRow.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.size = parseInt(btn.dataset.size, 10);
        els.sizeRow.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    /* Downloads */
    function filenameBase() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return 'qr-' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate())
        + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
    }

    function triggerDownload(href, filename, revoke) {
      const a = document.createElement('a');
      a.href = href;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      if (revoke) setTimeout(() => URL.revokeObjectURL(href), 1000);
    }

    els.downloadPng.addEventListener('click', () => {
      if (els.downloadPng.disabled) return;
      triggerDownload(createFramedCanvas(false).toDataURL('image/png'), filenameBase() + '.png');
    });

    els.downloadJpg.addEventListener('click', () => {
      if (els.downloadJpg.disabled) return;
      triggerDownload(createFramedCanvas(true).toDataURL('image/jpeg', 0.95), filenameBase() + '.jpg');
    });

    els.downloadSvg.addEventListener('click', () => {
      if (els.downloadSvg.disabled || !currentSvg) return;
      const blob = new Blob([currentSvg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      triggerDownload(url, filenameBase() + '.svg', true);
    });

    /* Initial render */
    render();
  </script>
</body>
</html>
